apiVersion: v1
kind: Namespace
metadata:
  name: mattermost-push-proxy
  labels:
    app.kubernetes.io/name: mattermost-push-proxy
    app.kubernetes.io/managed-by: manual
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mattermost-push-proxy-config
  namespace: mattermost-push-proxy
  labels:
    app.kubernetes.io/name: mattermost-push-proxy
    app.kubernetes.io/component: config
    app.kubernetes.io/managed-by: manual
data:
  mattermost-push-proxy.json: |
    {
      "ListenAddress":":8066",
      "ThrottlePerSec":300,
      "ThrottleMemoryStoreSize":50000,
      "ThrottleVaryByHeader":"X-Forwarded-For",
      "EnableMetrics": false,
      "SendTimeoutSec": 30,
      "RetryTimeoutSec": 8,
      "ApplePushSettings":[
        {
          "Type":"apple",
          "ApplePushUseDevelopment":false,
          "ApplePushCertPrivate":"",
          "ApplePushCertPassword":"",
          "ApplePushTopic":"com.mattermost.Mattermost",
          "AppleAuthKeyFile": "",
          "AppleAuthKeyID": "",
          "AppleTeamID": ""
        },
        {
          "Type":"apple_rn",
          "ApplePushUseDevelopment":false,
          "ApplePushCertPrivate":"",
          "ApplePushCertPassword":"",
          "ApplePushTopic":"com.mattermost.react.native",
          "AppleAuthKeyFile": "",
          "AppleAuthKeyID": "",
          "AppleTeamID": ""
        }
      ],
      "AndroidPushSettings": [
        {
          "Type":"android",
          "ServiceFileLocation":""
        },
        {
          "Type":"android_rn",
          "ServiceFileLocation":""
        }
      ],
      "CustomPushSettings": [
        {
          "Type":"android",
          "Endpoint":"http://158.220.202.248:8090/zjrcu-upad-consumer/api/message/sendMessage",
          "SysId":"robotclaw",
          "MessageType":"2",
          "IsSubApp":"0",
          "IsToWeb":"0",
          "Title":"mars"
        },
        {
          "Type":"apple",
          "Endpoint":"http://158.220.202.248:8090/zjrcu-upad-consumer/api/message/sendMessage",
          "SysId":"robotclaw",
          "MessageType":"2",
          "IsSubApp":"0",
          "IsToWeb":"0",
          "Title":"mars"
        },
        {
          "Type":"harmony",
          "Endpoint":"http://158.220.202.248:8090/zjrcu-upad-consumer/api/message/sendMessage",
          "SysId":"robotclaw",
          "MessageType":"2",
          "IsSubApp":"0",
          "IsToWeb":"0",
          "Title":"mars"
        }
      ],
      "EnableConsoleLog": true,
      "EnableFileLog": false,
      "LogFileLocation": "",
      "LogFormat": "plain"
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost-push-proxy
  namespace: mattermost-push-proxy
  labels:
    app.kubernetes.io/name: mattermost-push-proxy
    app.kubernetes.io/version: custom
    app.kubernetes.io/component: push-proxy
    app.kubernetes.io/managed-by: manual
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mattermost-push-proxy
      app.kubernetes.io/component: push-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mattermost-push-proxy
        app.kubernetes.io/version: custom
        app.kubernetes.io/component: push-proxy
        app.kubernetes.io/managed-by: manual
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: push-proxy
          image: mattermost/mattermost-push-proxy:dev
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /mattermost-push-proxy/config/mattermost-push-proxy.json
          ports:
            - name: http
              containerPort: 8066
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /version
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /version
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /mattermost-push-proxy/config/mattermost-push-proxy.json
              subPath: mattermost-push-proxy.json
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mattermost-push-proxy-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-push-proxy
  namespace: mattermost-push-proxy
  labels:
    app.kubernetes.io/name: mattermost-push-proxy
    app.kubernetes.io/component: service
    app.kubernetes.io/managed-by: manual
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mattermost-push-proxy
    app.kubernetes.io/component: push-proxy
  ports:
    - name: http
      port: 8066
      targetPort: http
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mattermost-push-proxy
  namespace: mattermost-push-proxy
  labels:
    app.kubernetes.io/name: mattermost-push-proxy
    app.kubernetes.io/component: pdb
    app.kubernetes.io/managed-by: manual
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mattermost-push-proxy
      app.kubernetes.io/component: push-proxy
